<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Apple Pay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
  }
  .phone-wrap {
    background: #111;
    border-radius: 55px;
    padding: 14px;
    width: 421px;
    box-shadow: 0 0 0 1.5px #444, 0 0 0 3px #222, 0 40px 100px rgba(0,0,0,0.8);
  }
  .phone-screen {
    background: #000;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    width: 393px;
    height: 852px;
    display: flex;
    flex-direction: column;
  }
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px 8px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    position: relative;
    z-index: 5;
  }
  .signal-icons { display: flex; gap: 5px; align-items: center; }
  #pay-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1c1c1e;
    flex: 1;
    padding: 40px 32px 80px;
  }
  #pay-screen.visible { display: flex; }
  .green-circle {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: #30d158;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    0%   { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .done-label {
    color: white;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    animation: fadeUp 0.35s 0.15s both;
  }
  .success-msg {
    color: rgba(255,255,255,0.7);
    font-size: 17px;
    text-align: center;
    line-height: 1.5;
    animation: fadeUp 0.35s 0.25s both;
  }
  .amount-big {
    color: white;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -2px;
    margin: 24px 0 8px;
    animation: fadeUp 0.35s 0.35s both;
  }
  .apple-pay-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 32px;
    animation: fadeUp 0.35s 0.45s both;
  }
  .apple-pay-badge span { color: rgba(255,255,255,0.3); font-size: 15px; }
  .done-btn {
    margin-top: 60px;
    background: #2c2c2e;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px 90px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    animation: fadeUp 0.35s 0.55s both;
    transition: opacity 0.15s;
  }
  .done-btn:active { opacity: 0.7; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #trigger-btn {
    margin-top: 28px;
    padding: 18px 0;
    background: white;
    color: #000;
    border: none;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    width: 421px;
  }
  #trigger-btn:active { opacity: 0.75; }
  .hint { color: rgba(255,255,255,0.3); font-size: 13px; text-align: center; margin-top: 10px; }
</style>
</head>
